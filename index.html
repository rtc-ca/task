<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Shared Task Manager</title>
</head>
<body class="bg-slate-100 min-h-screen">
  <div id="app" class="h-screen flex flex-col">
    <header class="bg-white border-b shadow-sm p-4 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-bold">Shared Task Manager</h1>
        <p class="text-sm text-slate-500">Google Apps Script + Sheets</p>
      </div>
      <div class="flex gap-3">
        <input id="searchInput" class="border rounded px-3 py-2" placeholder="Search tasks">
        <select id="currentUser" class="border rounded px-3 py-2">
          <option>Sir Ram</option>
          <option>Ma'am Ana</option>
          <option>Anj</option>
          <option>Isaac</option>
        </select>
      </div>
    </header>

    <main class="flex-1 p-6">
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-4 rounded shadow"><h2 id="statTotal">0</h2><p>Total</p></div>
        <div class="bg-white p-4 rounded shadow"><h2 id="statPending">0</h2><p>Pending</p></div>
        <div class="bg-white p-4 rounded shadow"><h2 id="statProgress">0</h2><p>In Progress</p></div>
        <div class="bg-white p-4 rounded shadow"><h2 id="statCompleted">0</h2><p>Completed</p></div>
      </div>

      <div id="taskContainer" class="bg-white rounded shadow p-4">
        Loading tasks...
      </div>
    </main>
  </div>

<script>
let EDIT_MODE = false;
let CURRENT_TASK = {};

function loadUsers(){
  google.script.run.withSuccessHandler(console.log).getUsers();
}
</script>
</body>
</html>
