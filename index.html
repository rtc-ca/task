<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <script src="https://cdn.tailwindcss.com"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Task Management System</title>
</head>

<body class="bg-slate-100 min-h-screen">

  <!-- APP -->
  <div id="app" class="h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-white border-b shadow-sm">

      <div class="px-6 py-4 flex flex-wrap gap-4 items-center justify-between">

        <!-- LEFT -->
        <div class="flex items-center gap-4">

          <div>
            <h1 class="text-2xl font-bold text-slate-800">
              Shared Task Manager
            </h1>

            <p class="text-sm text-slate-500">
              Internal Task Management System
            </p>
          </div>

        </div>

        <!-- RIGHT -->
        <div class="flex items-center gap-3">

          <!-- SEARCH -->
          <div class="relative">

            <input
              id="searchInput"
              type="text"
              placeholder="Search tasks..."
              class="w-72 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            >

          </div>

          <!-- USER SWITCHER -->
          <select
            id="currentUser"
            class="px-4 py-2 border rounded-lg bg-white"
          >
          </select>

        </div>

      </div>

    </header>

    <!-- MAIN -->
    <main class="flex-1 overflow-hidden">

      <div class="grid grid-cols-12 h-full">

        <!-- CENTER CONTENT -->
        <section class="col-span-12 lg:col-span-8 p-6 overflow-y-auto">

          <!-- STATS -->
          <div
            id="statsCards"
            class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 mb-6"
          >

            <div class="bg-white rounded-xl shadow p-5">
              <p class="text-slate-500 text-sm">Total Tasks</p>
              <h2 id="statTotal" class="text-3xl font-bold mt-2">0</h2>
            </div>

            <div class="bg-white rounded-xl shadow p-5">
              <p class="text-slate-500 text-sm">Pending</p>
              <h2 id="statPending" class="text-3xl font-bold mt-2">0</h2>
            </div>

            <div class="bg-white rounded-xl shadow p-5">
              <p class="text-slate-500 text-sm">In Progress</p>
              <h2 id="statProgress" class="text-3xl font-bold mt-2">0</h2>
            </div>

            <div class="bg-white rounded-xl shadow p-5">
              <p class="text-slate-500 text-sm">Completed</p>
              <h2 id="statCompleted" class="text-3xl font-bold mt-2">0</h2>
            </div>

          </div>

          <!-- VIEW TABS -->
          <div class="flex gap-2 mb-5">

            <button
              class="view-tab px-4 py-2 bg-blue-600 text-white rounded-lg"
              data-view="list"
            >
              List
            </button>

            <button
              class="view-tab px-4 py-2 bg-white border rounded-lg"
              data-view="kanban"
            >
              Kanban
            </button>

            <button
              class="view-tab px-4 py-2 bg-white border rounded-lg"
              data-view="done"
            >
              Done
            </button>

          </div>

          <!-- TASK CONTAINER -->
          <div
            id="taskContainer"
            class="bg-white rounded-xl shadow min-h-[500px] p-4"
          >

            <div class="text-center py-20 text-slate-400">
              Loading tasks...
            </div>

          </div>

        </section>

        <!-- RIGHT SIDEBAR -->
        <aside
          class="col-span-12 lg:col-span-4 bg-white border-l overflow-y-auto"
        >

          <div class="p-5 space-y-6">

            <!-- CALENDAR -->
            <div>

              <div class="flex items-center justify-between mb-3">
                <h3 class="font-bold text-lg">
                  Calendar
                </h3>
              </div>

              <div
                id="calendarContainer"
                class="border rounded-xl p-4 min-h-[320px]"
              >
                Calendar Loading...
              </div>

            </div>

            <!-- ACTIVITY -->
            <div>

              <div class="flex items-center justify-between mb-3">
                <h3 class="font-bold text-lg">
                  Activity
                </h3>
              </div>

              <div
                id="activityContainer"
                class="space-y-3"
              >

                <div class="text-slate-400">
                  Loading activity...
                </div>

              </div>

            </div>

          </div>

        </aside>

      </div>

    </main>

  </div>

  <!-- FLOATING ADD TASK -->
  <button
    id="addTaskBtn"
    class="fixed bottom-6 right-6 w-16 h-16 rounded-full bg-blue-600 text-white text-3xl shadow-xl hover:bg-blue-700"
  >
    +
  </button>

  <!-- JAVASCRIPT -->
  <script>

    let TASKS = [];
    let USERS = [];
    let ACTIVITY = [];
    let DASHBOARD = {};

    document.addEventListener("DOMContentLoaded", () => {

      initializeApp();

    });

    function initializeApp() {

      loadUsers();
      loadTasks();
      loadActivity();
      loadDashboardStats();

    }

    // =====================
    // USERS
    // =====================

    function loadUsers() {

      google.script.run
        .withSuccessHandler(renderUsers)
        .getUsers();

    }

    function renderUsers(users) {

      USERS = users || [];

      const select =
        document.getElementById("currentUser");

      select.innerHTML = "";

      USERS.forEach(user => {

        const option =
          document.createElement("option");

        option.value = user.name;
        option.textContent = user.name;

        select.appendChild(option);

      });

    }

    // =====================
    // TASKS
    // =====================

    function loadTasks() {

      google.script.run
        .withSuccessHandler(renderTasks)
        .getTasks();

    }

    function renderTasks(tasks) {

      TASKS = tasks || [];

      const container =
        document.getElementById("taskContainer");

      container.innerHTML = `
        <div class="space-y-3">
          ${TASKS.length} task(s) loaded
        </div>
      `;

    }

    // =====================
    // ACTIVITY
    // =====================

    function loadActivity() {

      google.script.run
        .withSuccessHandler(renderActivity)
        .getActivity();

    }

    function renderActivity(data) {

      ACTIVITY = data || [];

      const container =
        document.getElementById("activityContainer");

      container.innerHTML = "";

      ACTIVITY.slice(0,10).forEach(item => {

        container.innerHTML += `
          <div class="border rounded-lg p-3">
            <div class="font-medium">
              ${item.user}
            </div>

            <div class="text-sm text-slate-600">
              ${item.action}
            </div>
          </div>
        `;

      });

    }

    // =====================
    // DASHBOARD
    // =====================

    function loadDashboardStats() {

      google.script.run
        .withSuccessHandler(renderDashboard)
        .getDashboardStats();

    }

    function renderDashboard(stats) {

      DASHBOARD = stats || {};

      document.getElementById("statTotal").textContent =
        DASHBOARD.total || 0;

      document.getElementById("statPending").textContent =
        DASHBOARD.pending || 0;

      document.getElementById("statProgress").textContent =
        DASHBOARD.inProgress || 0;

      document.getElementById("statCompleted").textContent =
        DASHBOARD.completed || 0;

    }

    // =====================
    // SEARCH
    // =====================

    document
      .getElementById("searchInput")
      .addEventListener("input", function() {

        const keyword =
          this.value.toLowerCase();

        const filtered =
          TASKS.filter(task =>
            JSON.stringify(task)
              .toLowerCase()
              .includes(keyword)
          );

        renderTasks(filtered);

      });

    // =====================
    // ADD TASK
    // =====================

    document
      .getElementById("addTaskBtn")
      .addEventListener("click", () => {

        alert("Add Task Modal - Part 2B.2");

      });

  </script>

</body>
</html>
